services:
  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    environment:
      - SE_NODE_SESSION_TIMEOUT=120  # Auto-kills dead sessions after 2 mins
      - SE_SESSION_REQUEST_TIMEOUT=60
    ports:
      - "4444:4444"
    networks:
      - grid

  chrome-node:
    image: selenium/node-chromium:latest
    container_name: chrome-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
    shm_size: 2gb
    # Port 7900 allows you to view the live browser via VNC if needed
    ports:
      - "7900:7900"
    networks:
      - grid

networks:
  grid:
    driver: bridge