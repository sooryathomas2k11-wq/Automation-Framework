services:
  selenium-hub:
    image: seleniarm/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4444:4444"
    networks:
      - grid

  chrome-node:
    image: seleniarm/node-chromium:4.18.1
    container_name: chrome-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
    shm_size: 2gb
    ports:
      - "7900:7900"
    networks:
      - grid

  chrome-video:
    image: selenium/video:latest # Video images are usually architecture-agnostic
    container_name: chrome-video
    depends_on:
      - chrome-node
    environment:
      - DISPLAY_CONTAINER_NAME=chrome-node
      - FILE_NAME=chrome_session.mp4
      - SE_NODE_GRID_URL=http://selenium-hub:4444 # Required for the video to "find" the hub
    volumes:
      - ./videos:/videos
    networks:
      - grid

networks:
  grid:
    driver: bridge