name: CI Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Create Video Directory
        run: mkdir -p ./videos

      - name: Start Selenium Grid
        run: |
          # Use 'docker compose' (space) instead of 'docker-compose' (hyphen)
          docker compose up -d

      - name: Wait for Grid Readiness
        run: |
          until $(curl -s -f -o /dev/null http://localhost:4444/wd/hub/status); do
            echo "Waiting for Selenium Grid..."
            sleep 5
          done

      - name: Run Maven Tests
        run: |
          mvn clean test -DsuiteXmlFile=testng.xml -DhubUrl=http://localhost:4444/wd/hub
        continue-on-error: true

      - name: Stop Selenium Grid
        run: docker compose down

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/ExtentReport.html

      - name: Upload Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-videos
          path: ./videos